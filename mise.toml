[plugins]
fnox-env = "https://github.com/jdx/mise-env-fnox"

[tools]
biome = "latest"
fnox = "latest"
node = "lts"

[env]
_.fnox-env = { tools = true }

[tasks."test:integration"]
description = "Build and run Docker-backed real Pi integration tests"
run = """
set -euo pipefail
docker build --progress=plain -f tests/integration/docker/Dockerfile -t pi-superpowers-e2e .
docker run --rm -e ZAI_API_KEY pi-superpowers-e2e
"""
